# ============================================
# SR Finance CRM - Local Development Environment
# ============================================
# Services:
#   app     - Next.js application (hot-reload enabled)
#   db      - PostgreSQL (Supabase-optimized)
#   api     - PostgREST (REST API for database)
#   kong    - API gateway (routes /rest/v1/* to PostgREST)
#   meta    - PostgreSQL metadata API (for Studio)
#   studio  - Supabase Studio (database management UI)
#   auth    - GoTrue (Supabase Auth, needed by Studio)
#   realtime - Realtime subscriptions
#   storage - Storage API
#   n8n     - n8n workflow automation
#
# Getting started:
#   1. Copy .env.example to .env.local and adjust values
#   2. Run: docker compose up -d
#   3. Wait for all services to start, then visit:
#      - App:    http://localhost:3000
#      - Studio: http://localhost:8080
#      - n8n:    http://localhost:5678
#   4. The database is exposed on port 5432 for direct access
#      (Host: localhost | User: postgres | Password: postgres | DB: postgres)
#
# Supabase API:
#   The Supabase client connects to http://localhost:8000 which is
#   the Kong API gateway. Kong routes /rest/v1/* to PostgREST.
#
# JWT Configuration:
#   The JWT_SECRET below is for local development only.
#   The ANON_KEY and SERVICE_ROLE_KEY are standard Supabase local dev keys.
#
# ⚠️  Important: Server-side API routes (e.g., /api/n8n/*) call Supabase
#    from within the container. They use a separate SUPABASE_INTERNAL_URL
#    env var pointing to http://kong:8000 (Docker DNS), while client-side
#    code uses NEXT_PUBLIC_SUPABASE_URL=http://localhost:8000.
# ============================================

services:

  # ===== PostgreSQL Database (Supabase-optimized) =====
  db:
    image: supabase/postgres:15.1.0.105
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ===== PostgREST (RESTful API for the database) =====
  api:
    image: postgrest/postgrest:v12.0.1
    restart: unless-stopped
    environment:
      PGRST_DB_URI: postgres://postgres:postgres@db:5432/postgres
      PGRST_OPENAPI_SERVER_PROXY_URI: http://localhost:8000
      PGRST_DB_SCHEMA: public
      PGRST_DB_ANON_ROLE: postgres
      PGRST_JWT_SECRET: super-secret-jwt-token-with-at-least-32-characters-long
    depends_on:
      db:
        condition: service_healthy

  # ===== Kong (API Gateway) =====
  # Routes /rest/v1/* → PostgREST, /auth/v1/* → GoTrue, etc.
  kong:
    image: kong:2.8.1
    restart: unless-stopped
    ports:
      - "8000:8000"   # Public API port (what Supabase client connects to)
      - "8001:8001"   # Admin API (for debugging)
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
    volumes:
      - ./docker/kong.yml:/etc/kong/kong.yml
    depends_on:
      - api
      - auth
      - realtime
      - storage

  # ===== GoTrue (Authentication - Required by Studio) =====
  auth:
    image: supabase/gotrue:v2.157.0
    restart: unless-stopped
    environment:
      GOTRUE_JWT_SECRET: super-secret-jwt-token-with-at-least-32-characters-long
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DATABASE_URL: postgres://postgres:postgres@db:5432/postgres
      GOTRUE_SITE_URL: http://localhost:3000
      GOTRUE_MAILER_AUTOCONFIRM: "true"
      GOTRUE_LOG_LEVEL: debug
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
    depends_on:
      db:
        condition: service_healthy

  # ===== Realtime (WebSocket-based subscriptions) =====
  realtime:
    image: supabase/realtime:v2.29.10
    restart: unless-stopped
    environment:
      PORT: 4000
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: postgres
      DB_AFTER_CONNECT_QUERY: "SET session_preload_libraries = 'supabase_v8';"
      JWT_SECRET: super-secret-jwt-token-with-at-least-32-characters-long
      REPLICATION_MODE: RLS
      REPLICATION_POLL_INTERVAL: 100
      SECURE_CHANNELS: "false"
    depends_on:
      db:
        condition: service_healthy

  # ===== Storage API =====
  storage:
    image: supabase/storage-api:v1.11.13
    restart: unless-stopped
    environment:
      ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyAgCiAgICAicm9sZSI6ICJhbm9uIiwKICAgICJpc3MiOiAic3VwYWJhc2UtZGVtbyIsCiAgICAiaWF0IjogMTY0MTc2OTIwMCwKICAgICJleHAiOiAxNzk1NDM1NjAwCn0.dc_X5iR_VP_pTkarTusenH1b1_VZ0YGejKCLBGp-R3A
      SERVICE_ROLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyAgCiAgICAicm9sZSI6ICJzZXJ2aWNlX3JvbGUiLAogICAgImlzcyI6ICJzdXBhYmFzZS1kZW1vIiwKICAgICJpYXQiOiAxNjQxNzY5MjAwLAogICAgImV4cCI6IDE3OTU0MzU2MDB9.da_4CozUemjL4EwESFBlJ8E4JHBrf1Id_7Kyrhq2Hcc
      POSTGREST_URL: http://api:3000
      PGRST_JWT_SECRET: super-secret-jwt-token-with-at-least-32-characters-long
      DATABASE_URL: postgres://postgres:postgres@db:5432/postgres
      FILE_SIZE_LIMIT: 52428800
      STORAGE_BACKEND: file
      FILE_STORAGE_PATH: /var/lib/storage
      TENANT_ID: default
      REGION: local
      GLOBAL_S3_BUCKET: local
    volumes:
      - storage_data:/var/lib/storage
    depends_on:
      db:
        condition: service_healthy

  # ===== PostgreSQL Meta (Metadata API - Required by Studio) =====
  meta:
    image: supabase/postgres-meta:v0.84.2
    restart: unless-stopped
    environment:
      PG_META_PORT: 8080
      PG_META_DB_HOST: db
      PG_META_DB_PORT: 5432
      PG_META_DB_USER: postgres
      PG_META_DB_PASSWORD: postgres
      PG_META_DB_NAME: postgres
      PG_META_PG_SETUP_QUERY: "CREATE EXTENSION IF NOT EXISTS pg_stat_statements;"
    depends_on:
      db:
        condition: service_healthy

  # ===== Supabase Studio (Database Management UI) =====
  studio:
    image: supabase/studio:20241202-698c1c1
    restart: unless-stopped
    ports:
      - "8080:3000"
    environment:
      SUPABASE_URL: http://kong:8000
      STUDIO_PG_META_URL: http://meta:8080
      SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyAgCiAgICAicm9sZSI6ICJhbm9uIiwKICAgICJpc3MiOiAic3VwYWJhc2UtZGVtbyIsCiAgICAiaWF0IjogMTY0MTc2OTIwMCwKICAgICJleHAiOiAxNzk1NDM1NjAwCn0.dc_X5iR_VP_pTkarTusenH1b1_VZ0YGejKCLBGp-R3A
      SUPABASE_SERVICE_ROLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyAgCiAgICAicm9sZSI6ICJzZXJ2aWNlX3JvbGUiLAogICAgImlzcyI6ICJzdXBhYmFzZS1kZW1vIiwKICAgICJpYXQiOiAxNjQxNzY5MjAwLAogICAgImV4cCI6IDE3OTU0MzU2MDB9.da_4CozUemjL4EwESFBlJ8E4JHBrf1Id_7Kyrhq2Hcc
    depends_on:
      - meta
      - kong

  # ===== Next.js Application (Development Mode with Hot-Reload) =====
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: deps
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    environment:
      NODE_ENV: development
      # Client-side Supabase URL (browser reaches Kong on the host)
      NEXT_PUBLIC_SUPABASE_URL: http://localhost:8000
      # Server-side Supabase URL (container reaches Kong via Docker DNS)
      SUPABASE_INTERNAL_URL: http://kong:8000
      NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyAgCiAgICAicm9sZSI6ICJhbm9uIiwKICAgICJpc3MiOiAic3VwYWJhc2UtZGVtbyIsCiAgICAiaWF0IjogMTY0MTc2OTIwMCwKICAgICJleHAiOiAxNzk1NDM1NjAwCn0.dc_X5iR_VP_pTkarTusenH1b1_VZ0YGejKCLBGp-R3A
      N8N_API_KEY: ${N8N_API_KEY:-sr-n8n-key-change-me}
    volumes:
      # Mount source code for hot-reload
      - ./src:/app/src
      - ./public:/app/public
      - ./package.json:/app/package.json
      - ./next.config.mjs:/app/next.config.mjs
      - ./tailwind.config.ts:/app/tailwind.config.ts
      - ./postcss.config.mjs:/app/postcss.config.mjs
      - ./tsconfig.json:/app/tsconfig.json
      # Preserve node_modules and .next inside the container
      - app_node_modules:/app/node_modules
      - app_next:/app/.next
    command: npx next dev --turbopack
    depends_on:
      app-init:
        condition: service_completed_successfully

  # ===== App Initialization (run migrations before app starts) =====
  app-init:
    image: supabase/postgres:15.1.0.105
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./supabase/migrations:/migrations
    command: >
      sh -c "
        for f in /migrations/*.sql; do
          echo \"Applying migration: $$f\";
          PGPASSWORD=postgres psql -h db -U postgres -f \"$$f\";
        done;
        echo 'All migrations applied successfully.';
      "

  # ===== n8n Workflow Automation =====
  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      N8N_HOST: localhost:5678
      WEBHOOK_URL: http://localhost:5678
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  postgres_data:
  storage_data:
  n8n_data:
  app_node_modules:
  app_next:
